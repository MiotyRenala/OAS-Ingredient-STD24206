openapi: 3.0.0
info:
  title: TD OAS - Exercise 2
  version: 1.0.0

servers:
  - 'http://localhost:8080'

paths:
  /users:
    get:
      parameters:
        - in: query
          name: page
          schema:
            type: integer
        - in: query
          name: size
          schema:
            type: integer
      responses:
        200:
            description: List of users
            content:
              application/json:
                schema:
                  type: array
                  items:
                    type: object
                    properties:
                      id:
                        type: integer
                        example: 1
                      name:
                        type: string
                        example: Alice
                      email:
                        type: string
                        example: alice@example.com

        400:
            description: Bad Request
            content:
              application/json:
                schema:
                  type: object
                  properties:
                    error:
                      type: string
                      example: Bad types for provided query parameters


